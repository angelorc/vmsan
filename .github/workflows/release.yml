name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run lint

      - run: bun run typecheck

      - run: bun run build

      - run: bun run test

  release:
    needs: release-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Version packages or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: Version Packages
          title: Version Packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  release-agent:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            arch: x86_64
          - goos: linux
            goarch: arm64
            arch: aarch64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Read package version
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build vmsan-agent
        working-directory: agent
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.version=v${{ steps.meta.outputs.version }}" -o vmsan-agent-${{ matrix.arch }} .

      - name: Build vmsan-nftables
        working-directory: nftables
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.version=v${{ steps.meta.outputs.version }}" -o vmsan-nftables-${{ matrix.arch }} ./cmd/vmsan-nftables

      - name: Build vmsan-gateway
        working-directory: hostd
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.version=v${{ steps.meta.outputs.version }}" -o vmsan-gateway-${{ matrix.arch }} ./cmd/vmsan-gateway

      - name: Build vmsan-server
        working-directory: hostd
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.version=v${{ steps.meta.outputs.version }}" -o vmsan-server-${{ matrix.arch }} ./cmd/vmsan-server

      - name: Build vmsan-agent-host
        working-directory: hostd
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X main.version=v${{ steps.meta.outputs.version }}" -o vmsan-agent-host-${{ matrix.arch }} ./cmd/vmsan-agent-host

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          files: |
            agent/vmsan-agent-${{ matrix.arch }}
            nftables/vmsan-nftables-${{ matrix.arch }}
            hostd/vmsan-gateway-${{ matrix.arch }}
            hostd/vmsan-server-${{ matrix.arch }}
            hostd/vmsan-agent-host-${{ matrix.arch }}
